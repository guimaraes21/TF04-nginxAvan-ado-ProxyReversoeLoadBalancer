version: '3.8'

services:
  # Load Balancer Nginx
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - ecommerce-network
    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3
      - admin
    restart: always

  # Frontend
  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    networks:
      - ecommerce-network
    restart: always

  # Backend instância 1
  backend1:
    build: ./backend
    container_name: ecommerce-backend1
    environment:
      - INSTANCE_ID=backend-1
      - INSTANCE_NAME=Backend-1
      - PORT=5000
    networks:
      - ecommerce-network
    restart: always

  # Backend instância 2
  backend2:
    build: ./backend
    container_name: ecommerce-backend2
    environment:
      - INSTANCE_ID=backend-2
      - INSTANCE_NAME=Backend-2
      - PORT=5000
    networks:
      - ecommerce-network
    restart: always

  # Backend instância 3
  backend3:
    build: ./backend
    container_name: ecommerce-backend3
    environment:
      - INSTANCE_ID=backend-3
      - INSTANCE_NAME=Backend-3
      - PORT=5000
    networks:
      - ecommerce-network
    restart: always

  # Admin panel
  admin:
    build: ./admin
    container_name: ecommerce-admin
    networks:
      - ecommerce-network
    restart: always

networks:
  ecommerce-network:
    driver: bridge
