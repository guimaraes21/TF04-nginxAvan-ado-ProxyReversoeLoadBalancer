<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - TechStore</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>🛒 TechStore</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/produtos.html">Produtos</a>
            <a href="/carrinho.html">Carrinho</a>
        </nav>
    </header>
    <div class="container">
        <h2 style="margin-bottom:1rem;">Todos os Produtos</h2>
        <div class="products-grid" id="products"></div>
        <div class="server-info" id="server-info">Carregando...</div>
    </div>
    <footer>TF04 - E-commerce com Load Balancer &copy; 2026 UniFAAT</footer>
    <script>
        fetch('/api/products')
            .then(r => r.json())
            .then(data => {
                const grid = document.getElementById('products');
                grid.innerHTML = data.products.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p class="price">R$ ${p.price.toFixed(2)}</p>
                        <p class="stock">Estoque: ${p.stock} unidades</p>
                        <button class="btn">Comprar</button>
                    </div>
                `).join('');
                document.getElementById('server-info').textContent =
                    `Servido pela instância: ${data.served_by}`;
            });
    </script>
</body>
</html>
